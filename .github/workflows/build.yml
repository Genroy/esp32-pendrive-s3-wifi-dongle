name: build-firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ใช้ค่า default (RNDIS) โดยลบ sdkconfig เดิม
        run: rm -f sdkconfig

      - name: Build ด้วย ESP-IDF บนคลาวด์
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: '.'

      - name: อัปโหลดไฟล์ .bin ให้โหลด
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3-rndis
          path: |
            build/usb_dongle.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flasher_args.json
          if-no-files-found: error
